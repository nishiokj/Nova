name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Typecheck (post-build)
        run: bun run lint

      - name: Standalone binary
        run: |
          bun build --compile \
            --target=bun-linux-x64 \
            --minify \
            --define "process.env.NOVA_VERSION='\"ci-test\"'" \
            ./packages/apps/launcher/standalone.ts \
            --outfile ./nova-test
          ./nova-test --version

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  dx-evidence-contract:
    name: DX Evidence Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate DX evidence ledgers (lint mode)
        run: |
          scripts/ci/validate-dx-evidence.sh --phase phase0 --mode lint
          scripts/ci/validate-dx-evidence.sh --phase phase1 --mode lint
          scripts/ci/validate-dx-evidence.sh --phase phase2 --mode lint

  deployable-components:
    name: Deployable Component - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: graphd
            build_cmd: bun run --cwd packages/infra/graphd build
            verify_cmd: bun run --cwd packages/infra/graphd lint
          - name: harness-daemon
            build_cmd: bun run --cwd packages/infra/harness-daemon build
            verify_cmd: bun run --cwd packages/infra/harness-daemon lint
          - name: agent-memory
            build_cmd: bun run --cwd packages/plugins/agent-memory build
            verify_cmd: bun run --cwd packages/plugins/agent-memory lint
          - name: launcher
            build_cmd: bun run --cwd packages/apps/launcher build
            verify_cmd: bun run --cwd packages/apps/launcher build
          - name: tui
            build_cmd: bun run --cwd packages/apps/tui build
            verify_cmd: bun run --cwd packages/apps/tui build
          - name: dashboard
            build_cmd: bun run --cwd packages/apps/dashboard build
            verify_cmd: bun run --cwd packages/apps/dashboard lint
          - name: dashboard-compact
            build_cmd: bun run --cwd packages/apps/dashboard-compact build
            verify_cmd: bun run --cwd packages/apps/dashboard-compact typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.build_cmd }}

      - name: Verify ${{ matrix.name }}
        run: ${{ matrix.verify_cmd }}

  interprocess-smoke:
    name: Inter-process Smoke
    runs-on: ubuntu-latest
    needs: [deployable-components]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run split-runtime smoke test
        run: bun run smoke:interprocess

  split-runtime-contracts:
    name: Split Runtime Typecheck + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck split runtime contracts
        run: bun run typecheck:split-runtime

      - name: Run split runtime regression tests
        run: bun run test:split-runtime

  dead-code:
    name: Dead Code + Unused Exports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (knip needs compiled declarations)
        run: bun run build

      - name: Run knip
        run: bunx knip --no-exit-code --reporter compact

  hygiene:
    name: Code Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Explicit any usage
        run: |
          echo "## Explicit 'any' usage in source files"
          count=0
          while IFS= read -r file; do
            matches=$(grep -n ': any\b\|as any\b\|<any>' "$file" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo ""
              echo "### $file"
              echo "$matches"
              count=$((count + $(echo "$matches" | wc -l)))
            fi
          done < <(find packages/*/*/src packages/*/*/*/src -name '*.ts' ! -name '*.test.ts' ! -name '*.d.ts' -type f 2>/dev/null)
          echo ""
          echo "Total: $count explicit any annotations"
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count explicit 'any' annotations in source files"
          fi

      - name: Type assertions (as casts)
        run: |
          echo "## Type assertions in source files"
          count=0
          while IFS= read -r file; do
            matches=$(grep -n ' as [A-Z]\| as {' "$file" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo ""
              echo "### $file"
              echo "$matches"
              count=$((count + $(echo "$matches" | wc -l)))
            fi
          done < <(find packages/*/*/src packages/*/*/*/src -name '*.ts' ! -name '*.test.ts' ! -name '*.d.ts' -type f 2>/dev/null)
          echo ""
          echo "Total: $count type assertions"
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count type assertions — consider narrowing types instead"
          fi

      - name: Suppressed type errors
        run: |
          echo "## @ts-ignore / @ts-expect-error / @ts-nocheck"
          count=0
          while IFS= read -r file; do
            matches=$(grep -n '@ts-ignore\|@ts-expect-error\|@ts-nocheck' "$file" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo ""
              echo "### $file"
              echo "$matches"
              count=$((count + $(echo "$matches" | wc -l)))
            fi
          done < <(find packages/*/*/src packages/*/*/*/src -name '*.ts' ! -name '*.test.ts' -type f 2>/dev/null)
          echo ""
          echo "Total: $count type suppressions"
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count @ts-ignore/@ts-expect-error/@ts-nocheck suppressions"
          fi

      - name: Console.log in production code
        run: |
          echo "## console.log in source files (not tests)"
          count=0
          while IFS= read -r file; do
            matches=$(grep -n 'console\.log\b' "$file" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo ""
              echo "### $file"
              echo "$matches"
              count=$((count + $(echo "$matches" | wc -l)))
            fi
          done < <(find packages/*/*/src packages/*/*/*/src -name '*.ts' ! -name '*.test.ts' -type f 2>/dev/null)
          echo ""
          echo "Total: $count console.log calls"
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count console.log calls in source files"
          fi

      - name: TODO/FIXME/HACK markers
        run: |
          echo "## TODO / FIXME / HACK markers"
          count=0
          while IFS= read -r file; do
            matches=$(grep -n 'TODO\|FIXME\|HACK\|XXX' "$file" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo ""
              echo "### $file"
              echo "$matches"
              count=$((count + $(echo "$matches" | wc -l)))
            fi
          done < <(find packages/*/*/src packages/*/*/*/src -name '*.ts' -type f 2>/dev/null)
          echo ""
          echo "Total: $count markers"
          if [ "$count" -gt 0 ]; then
            echo "::notice::Found $count TODO/FIXME/HACK markers"
          fi
