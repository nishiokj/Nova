name: Metarepo Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/metarepo-deploy.yml"
      - "packages/apps/metarepo/**"
      - "packages/plugins/entity-graph/**"
      - "scripts/pr-review-ci.ts"
      - "package.json"
      - "bun.lock"
      - "tsconfig.base.json"
      - ".dockerignore"
  push:
    branches: [main]
    paths:
      - ".github/workflows/metarepo-deploy.yml"
      - "packages/apps/metarepo/**"
      - "packages/plugins/entity-graph/**"
      - "scripts/pr-review-ci.ts"
      - "package.json"
      - "bun.lock"
      - "tsconfig.base.json"
      - ".dockerignore"
  workflow_dispatch:
    inputs:
      publish:
        description: "Push image to GHCR"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: metarepo-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Metarepo
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      METAREPO_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      METAREPO_WORKDIR: /tmp/metarepo
      METAREPO_SECRET_MASTER_KEY: ci-test-master-key
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck service
        run: bun run --cwd packages/apps/metarepo lint

      - name: Build service
        run: bun run --cwd packages/apps/metarepo build

      - name: Run metarepo unit tests
        run: bun run test -- tests/metarepo/metarepo-routes.test.ts tests/metarepo/metarepo-cli.test.ts tests/scripts/pr-review-ci.test.ts

      - name: Run metarepo behavioral test
        run: bun run test -- tests/behavioral/metarepo/metarepo.behavior.test.ts

  image:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}-metarepo" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/apps/metarepo/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.publish) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
