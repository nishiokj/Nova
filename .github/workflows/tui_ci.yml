name: TUI CI

on:
  push: {}
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pytest
        run: |
          pytest -q

      - name: Headless smoke import and graceful-shutdown test
        run: |
          python - <<'PY'
import subprocess, sys, time, signal

code = r"""
import importlib, sys, time
try:
    mod = importlib.import_module('TUI')
except Exception as e:
    print('IMPORT_ERROR:' + repr(e))
    sys.exit(3)
for name in ('main','run','start'):
    fn = getattr(mod, name, None)
    if callable(fn):
        try:
            fn()
        except SystemExit:
            sys.exit(0)
        except Exception as e:
            print('ENTRY_EXCEPTION:' + repr(e))
            sys.exit(2)
# If there's no entrypoint or it returns, sleep briefly to allow signal test.
time.sleep(10)
"""

proc = subprocess.Popen([sys.executable, '-c', code], stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
# Give the process a moment to start
time.sleep(1)
# Request graceful shutdown
proc.send_signal(signal.SIGINT)
try:
    proc.wait(timeout=15)
except Exception:
    proc.kill()
    raise

out = proc.stdout.read().decode('utf-8', errors='replace') if proc.stdout is not None else ''
if 'IMPORT_ERROR:' in out or 'ENTRY_EXCEPTION:' in out:
    print(out)
    sys.exit(1)
print('smoke-ok')
PY
