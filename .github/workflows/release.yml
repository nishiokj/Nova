name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            bun-target: bun-linux-x64
          - target: linux-arm64
            os: ubuntu-latest
            bun-target: bun-linux-arm64
          - target: darwin-x64
            os: macos-latest
            bun-target: bun-darwin-x64
          - target: darwin-arm64
            os: macos-latest
            bun-target: bun-darwin-arm64
          - target: windows-x64
            os: windows-latest
            bun-target: bun-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        run: |
          EXT=""
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            EXT=".exe"
          fi

          bun build --compile \
            --target=${{ matrix.bun-target }} \
            --minify \
            --define "process.env.NOVA_VERSION='\"${{ steps.version.outputs.VERSION }}\"'" \
            ./packages/launcher/standalone.ts \
            --outfile ./nova-${{ matrix.target }}${EXT}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-${{ matrix.target }}
          path: nova-${{ matrix.target }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nova-* > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nova-*
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

  update-install-scripts:
    name: Update Install Scripts
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # Update version file for the install scripts to read
      - name: Update version file
        run: |
          echo "${GITHUB_REF#refs/tags/}" > latest-version.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-version.txt
          git diff --staged --quiet || git commit -m "chore: update latest version to ${GITHUB_REF#refs/tags/}"
          git push
