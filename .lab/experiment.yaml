version: '0.3'
experiment:
  id: exp_local
  name: AgentLab Experiment
  description: Generated by lab init
  owner: you
  tags: [example]
dataset:
  suite_id: local_suite
  provider: local_jsonl
  path: tasks.jsonl
  schema_version: task_jsonl_v1
  split_id: dev
  limit: 50
design:
  sanitization_profile: hermetic_functional_v2
  comparison: paired
  replications: 1
  random_seed: 1337
  shuffle_tasks: true
  max_concurrency: 1
analysis_plan:
  primary_metrics: [success]
  secondary_metrics: [latency_ms]
  missingness:
    policy: paired_drop
    record_reasons: true
  tests:
    success: { method: paired_bootstrap, ci: 0.95, resamples: 1000 }
    latency_ms: { method: paired_bootstrap, ci: 0.95, resamples: 1000 }
  multiple_comparisons:
    method: none
  reporting:
    effect_sizes: [risk_diff, median_diff]
    show_task_level_table: true
baseline:
  variant_id: base
  bindings: {}
variants: []
runtime:
  harness:
    mode: cli
    command: ["bun","./scripts/agentlab/run_cli.ts"]
    integration_level: cli_events
    input_path: /out/trial_input.json
    output_path: /out/trial_output.json
    control_plane:
      mode: file
      path: /state/lab_control.json
  sandbox:
    mode: container
    engine: docker
    image: oven/bun:1
    root_read_only: true
    run_as_user: "1000:1000"
    hardening:
      no_new_privileges: true
      drop_all_caps: true
    resources:
      cpu_count: 2
      memory_mb: 2048
  network:
    mode: none
    allowed_hosts: []
validity:
  fail_on_state_leak: true
  fail_on_profile_invariant_violation: true
