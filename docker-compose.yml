version: '3.8'

services:
  audio-processor:
    build: .
    container_name: audio-vad-processor
    restart: unless-stopped
    
    # Audio device access
    devices:
      - "/dev/snd:/dev/snd"
    
    # Privileged mode may be needed for some audio devices
    privileged: true
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - AUDIO_LOG_LEVEL=INFO
    
    # Volume mounts
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # For potential GUI debugging
    
    # Network mode host for better audio device access
    network_mode: host
    
    # Command with example configuration
    command: ["python", "audio.py" ]
    
    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-f", "audio.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Add a service to run custom child processes
  # child-process:
  #   build: .
  #   container_name: child-process
  #   depends_on:
  #     - audio-processor
  #   command: ["your-custom-command-here"]
