version: '0.3'
experiment:
  id: exp_2026_02_04_local
  name: jesus
  description: Generated by lab init
  owner: you
  tags:
  - example
dataset:
  suite_id: local_suite
  provider: local_jsonl
  path: tasks.jsonl
  schema_version: task_jsonl_v1
  split_id: dev
  limit: 50
design:
  sanitization_profile: hermetic_functional_v2
  comparison: paired
  replications: 1
  random_seed: 1337
  shuffle_tasks: true
  max_concurrency: 1
analysis_plan:
  primary_metrics:
  - success
  secondary_metrics:
  - latency_ms
  missingness:
    policy: paired_drop
    record_reasons: true
  tests:
    success:
      method: paired_bootstrap
      ci: 0.95
      resamples: 1000
    latency_ms:
      method: paired_bootstrap
      ci: 0.95
      resamples: 1000
  multiple_comparisons:
    method: none
  reporting:
    effect_sizes:
    - risk_diff
    - median_diff
    show_task_level_table: true
baseline:
  variant_id: base
  bindings: {}
variants: []
runtime:
  harness:
    mode: cli
    command:
    - node
    - ./agentlab/harness.js
    - run
    integration_level: cli_events
    input_path: /out/trial_input.json
    output_path: /out/trial_output.json
    control_plane:
      mode: file
      path: /state/lab_control.json
    events:
      mode: jsonl
      path: /out/harness_events.jsonl
      schema_version: hook_events_v1
  network:
    mode: none
    allowed_hosts: []
validity:
  fail_on_state_leak: true
  fail_on_profile_invariant_violation: true
